[SERVICE]
    Flush               5
    Log_Level           info
    Parsers_File        /etc/fluent-bit/parsers.conf

[INPUT]
    Name                tcp
    Listen              127.0.0.1
    Port                50052
    Format              none
    Tag                 enclave-logs

[INPUT]
    Name                systemd
    Tag                 host-logs
    Read_From_Tail      On
    Systemd_Filter      _SYSTEMD_UNIT=vsockproxy.service
    Systemd_Filter      _SYSTEMD_UNIT=enclave.service

[FILTER]
    Name                parser
    Match               enclave-logs
    Key_Name            log
    Parser              json
    Reserve_Data        false

[OUTPUT]
    Name                cloudwatch_logs
    Match               *
    region              ${AWS_REGION}
    log_group_name      ${LOG_GROUP_NAME}
    log_stream_prefix   ${SERVICE_NAME}-${INSTANCE_ID}-
    auto_create_group   false
