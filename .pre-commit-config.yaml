exclude:
  (?x)^( bazel-(bin|out|testlogs|workspace)/.*| build_defs/shared_libraries/patches/.*| version\.txt| CHANGELOG\.md |
  toolchains/sysroot/sysroot\.tar\.xz )$
fail_fast: false

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: fix-byte-order-marker
      - id: mixed-line-ending
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-added-large-files
      - id: check-symlinks
      - id: check-vcs-permalinks
      - id: check-executables-have-shebangs
      - id: detect-private-key

  - repo: local
    hooks:
      - id: gitlinks
        name: Check gitlinks
        language: script
        entry: devkit/gitlinks --check
        always_run: true
        pass_filenames: false
      - id: addlicense
        name: addlicense
        language: golang
        additional_dependencies:
          - github.com/google/addlicense@v1.1.1
        always_run: false
        pass_filenames: true
        entry: addlicense -v
        types_or:
          - text

      - id: addlicense-check
        name: addlicense check
        language: golang
        additional_dependencies:
          - github.com/google/addlicense@v1.1.1
        always_run: false
        pass_filenames: true
        entry: addlicense -check
        types_or:
          - text

      - id: buildifier
        name: buildifier
        description: Format bazel WORKSPACE, BUILD and .bzl files with a standard convention.
        language: golang
        additional_dependencies:
          - github.com/bazelbuild/buildtools/buildifier@6.1.1
        always_run: true
        pass_filenames: true
        types_or:
          - bazel
        entry: buildifier
        args:
          - -lint=fix
          - -mode=fix
          - -warnings=all

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell

  - repo: https://github.com/jumanjihouse/pre-commit-hooks
    rev: 3.0.0
    hooks:
      - id: require-ascii
        exclude: (sigstore\.json|javatests/com/google/tca/attestation/oak/testdata/.*\.textproto)$
      - id: shellcheck

  - repo: https://github.com/macisamuele/language-formatters-pre-commit-hooks
    rev: v2.15.0
    hooks:
      - id: pretty-format-java
        name: Google Java Formatter
        # Specify version of the google java formatter
        # https://github.com/google/google-java-format/releases/
        args: [--autofix, --google-java-formatter-version=1.29.0]

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        name: prettier markdown, json, yaml
        types_or:
          - markdown
          - json
          - yaml
        exclude: .*\.clang-tidy$
