syntax = "proto3";

package google.pes.v1;

import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/pes/v1/endorsement.proto";

option java_multiple_files = true;
option java_outer_classname = "PublicEndorsementServiceProto";
option java_package = "com.google.pes.v1";

service PublicEndorsementService {
  // Publishes provided signed statement and creates signed endorsement.
  rpc CreatePublicEndorsement(CreatePublicEndorsementRequest) returns (PublicEndorsement) {
    option (google.api.http) = {
      post: "/v1/endorsements"
      body: "public_endorsement"
    };
    option (google.api.method_signature) = "public_endorsement";
  }
}

message CreatePublicEndorsementRequest {
  // The endorsement to create.
  PublicEndorsement public_endorsement = 1 [(google.api.field_behavior) = REQUIRED];
}
