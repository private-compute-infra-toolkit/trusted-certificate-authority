syntax = "proto3";

package google.pes.policy.v1;

import "google/pes/v1/verification_material.proto";

option java_multiple_files = true;
option java_outer_classname = "PublisherPolicyProto";
option java_package = "com.google.pes.policy.v1";

message PublisherPolicy {
  string publisher_id = 1;
  repeated OidcTokenClaims oidc_token_claims = 2;
  repeated google.pes.v1.VerificationMaterial verification_material = 3;
}

message OidcTokenClaims {
  string issuer = 1;
  string subject = 2;
}
