syntax = "proto3";

package google.tca.v1;

import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "proto/attestation/endorsement.proto";
import "proto/attestation/evidence.proto";

option java_multiple_files = true;
option java_outer_classname = "TrustedCertificateAuthorityProto";
option java_package = "com.google.tca.v1";

service TrustedCertificateAuthority {
  rpc IssueCertificate(IssueCertificateRequest) returns (IssueCertificateResponse) {
    option (google.api.http) = {
      post: "/v1/certificates:issue"
      body: "*"
    };
  }
}

message IssueCertificateRequest {
  bytes certificate_signing_request = 1 [(google.api.field_behavior) = REQUIRED];
  AttestationEvidence attestation_evidence = 2 [(google.api.field_behavior) = REQUIRED];
}

message IssueCertificateResponse {
  repeated bytes signed_certificates = 1;
}

message AttestationEvidence {
  // One of the supported evidences.
  oneof evidence {
    OakAttestationEvidence oak_attestation_evidence = 1;
    AwsAttestationEvidence aws_attestation_evidence = 2;
    GcpAttestationEvidence gcp_attestation_evidence = 3;
  }
}

message OakAttestationEvidence {
  oak.attestation.v1.Evidence evidence = 1;
  oak.attestation.v1.Endorsements endorsements = 2;
  bytes signed_public_key = 3;
}

message AwsAttestationEvidence {
  bytes attestation_token = 1;
}

message GcpAttestationEvidence {
  bytes attestation_token = 1;
}
