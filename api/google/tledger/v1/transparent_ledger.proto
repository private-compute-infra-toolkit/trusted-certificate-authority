syntax = "proto3";

package google.tledger.v1;

import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/tledger/v1/entry.proto";

option java_multiple_files = true;
option java_outer_classname = "TransparentLedgerProto";
option java_package = "com.google.tledger.v1";

// Provides API for storing records in the Transparent Ledger - tamper-resistant
// transparency log.
service TransparentLedgerService {
  // Stores the record in the TLedger and returns corresponding signed log
  // entry.
  rpc CreateEntry(CreateEntryRequest) returns (Entry) {
    option (google.api.http) = {
      post: "/v1/entries"
      body: "entry"
    };
    option (google.api.method_signature) = "entry";
  }

  // Retrieves log entry by name.
  rpc GetEntry(GetEntryRequest) returns (Entry) {
    option (google.api.http) = {get: "/v1/{name=entries/*}"};
    option (google.api.method_signature) = "name";
  }
}

// Represents request body for entry creation.
message CreateEntryRequest {
  // Contains record data that should be stored in the log entry.
  Entry entry = 1 [(google.api.field_behavior) = REQUIRED];
}

// Represents request body for entry retrieval
message GetEntryRequest {
  // Name of the log entry that should be retrieved.
  // Format: entries/{entry}
  string name = 1 [(google.api.field_behavior) = REQUIRED];
}
