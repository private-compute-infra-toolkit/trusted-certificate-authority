syntax = "proto3";

package google.tledger.v1;

import "google/api/field_behavior.proto";

option java_multiple_files = true;
option java_outer_classname = "EntryProto";
option java_package = "com.google.tledger.v1";

// Represents a single signed entry on the ledger.
message Entry {
  // The server-assigned unique name for this entry.
  // This name can be used to retrieve the entry directly.
  // Format: entries/{entry}
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // The client-provided payload to be recorded on the ledger.
  bytes raw_entry = 2 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.field_behavior) = IMMUTABLE
  ];

  // The cryptographic signature of the 'raw_entry'. Given by TLedger's private key.
  bytes signature = 3 [(google.api.field_behavior) = OUTPUT_ONLY];

  // The algorithm used by the server to generate the 'signature'.
  // Example: "ECDSA_P256_SHA256"
  string signing_algorithm = 4 [(google.api.field_behavior) = OUTPUT_ONLY];

  // The identifier of the public key corresponding to the private key
  string key_id = 5 [(google.api.field_behavior) = OUTPUT_ONLY];
}
